name: Build, Pack, and Publish NuGet

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # SharpLinter.ClientTest consumes SharpLinter as a NuGet package from a local source.
    # Pack SharpLinter.Core first so the ClientTest project can restore successfully.
    - name: Pack SharpLinter.Core for ClientTest
      run: dotnet pack src/SharpLinter.Core/SharpLinter.Core.csproj --configuration Release -o nupkg

    - name: Restore Dependencies
      run: dotnet restore SharpLinter.slnx

    - name: Dotnet Build
      run: dotnet build SharpLinter.slnx --configuration Release --no-restore

    - name: Dotnet Test
      run: dotnet test SharpLinter.slnx --configuration Release --no-build --verbosity normal

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    # CRITICAL: Allows GitHub Actions to request an OIDC token for trusted publishing.
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # SharpLinter.ClientTest consumes SharpLinter as a NuGet package from a local source.
    # Pack SharpLinter.Core first so the ClientTest project can restore successfully.
    - name: Pack SharpLinter.Core for ClientTest
      run: dotnet pack src/SharpLinter.Core/SharpLinter.Core.csproj --configuration Release -o nupkg

    - name: Restore Dependencies
      run: dotnet restore SharpLinter.slnx

    - name: Dotnet Build
      run: dotnet build SharpLinter.slnx --configuration Release --no-restore

    - name: Dotnet Pack
      run: dotnet pack SharpLinter.slnx --configuration Release --no-build -o ./artifacts

    # Exchange the GitHub OIDC token for a short-lived NuGet API key.
    - name: NuGet Trusted Publishing Login
      uses: NuGet/login@v1
      id: nuget_login
      with:
        user: bitbundler

    # Push packages using the temporary token generated by the login step.
    - name: Dotnet Push to NuGet.org
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ steps.nuget_login.outputs.token }} \
          --skip-duplicate
